<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0c0e18"/>
  <!-- Glow -->
  <ellipse cx="50" cy="42" rx="36" ry="30" fill="#7c3aed" opacity="0.18"/>
  <!-- Wand stick -->
  <line x1="30" y1="72" x2="62" y2="40" stroke="#a78bfa" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Wand tip -->
  <rect x="58" y="30" width="11" height="11" rx="2" fill="#7c3aed" transform="rotate(45 63.5 35.5)"/>
  <rect x="60" y="32" width="7" height="7" rx="1" fill="#c4b5fd" transform="rotate(45 63.5 35.5)"/>
  <!-- Sparkle large -->
  <line x1="77" y1="21" x2="77" y2="33" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="71" y1="27" x2="83" y2="27" stroke="#818cf8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="73" y1="23" x2="81" y2="31" stroke="#818cf8" stroke-width="1.1" stroke-linecap="round"/>
  <line x1="81" y1="23" x2="73" y2="31" stroke="#818cf8" stroke-width="1.1" stroke-linecap="round"/>
  <!-- Sparkle small -->
  <line x1="32" y1="32" x2="32" y2="40" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="36" x2="36" y2="36" stroke="#c4b5fd" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Sparkle tiny -->
  <line x1="77" y1="58" x2="77" y2="63" stroke="#a78bfa" stroke-width="1.3" stroke-linecap="round"/>
  <line x1="74" y1="60.5" x2="80" y2="60.5" stroke="#a78bfa" stroke-width="1.3" stroke-linecap="round"/>
  <!-- Checkerboard strip -->
  <clipPath id="c"><rect width="100" height="100" rx="20"/></clipPath>
  <g clip-path="url(#c)">
    <rect x="0" y="84" width="100" height="16" fill="#1e2238"/>
    <rect x="0"  y="84" width="8" height="8" fill="#2a2d42"/>
    <rect x="16" y="84" width="8" height="8" fill="#2a2d42"/>
    <rect x="32" y="84" width="8" height="8" fill="#2a2d42"/>
    <rect x="48" y="84" width="8" height="8" fill="#2a2d42"/>
    <rect x="64" y="84" width="8" height="8" fill="#2a2d42"/>
    <rect x="80" y="84" width="8" height="8" fill="#2a2d42"/>
    <rect x="8"  y="92" width="8" height="8" fill="#2a2d42"/>
    <rect x="24" y="92" width="8" height="8" fill="#2a2d42"/>
    <rect x="40" y="92" width="8" height="8" fill="#2a2d42"/>
    <rect x="56" y="92" width="8" height="8" fill="#2a2d42"/>
    <rect x="72" y="92" width="8" height="8" fill="#2a2d42"/>
    <rect x="88" y="92" width="8" height="8" fill="#2a2d42"/>
  </g>
  <!-- Border -->
  <rect width="100" height="100" rx="20" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
</svg>